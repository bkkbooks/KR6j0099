body:
  text: 大清冊封西天大善自在佛領天下釋教普智持金剛達賴喇嘛造內閣掌譯西番蒙古諸文番學總管儀賓工布查布舊譯崇梵靜覺國師琢𭹴珞瓚校對傳賢首宗講經論沙門京都靜默寺住持僧海寬潤色內庭經呪館行走梵香寺大喇嘛巴尔藏嘉磋補譯顯親王府潤色校刻稽首離垢滿月主法雨饒益諸眾生修持儀軌行願法願滅諸苦獲安寧此約取信行係願之緣起也以上四句偈並分行細字儀賓工布查布所譯之舊文也按番本廣演源流辯正布壇置像設供等例三十餘篇文甚繁多皆非諷誦者無庸全譯今將供壇城法開列於後修建藥師壇法或有製造壇城或有繪畫壇城皆可再或奉安釋迦佛藥師七如來及諸大菩薩護法十二藥叉諸像各隨其宜香燈花供如法設之其供品隨時具辦務取虔潔欲修持者自身浴淨著新衣其為外浴肉酒蒜葱等不淨食斷之如三白三甜等淨食食之染污心遠離其為內浴以此法門行者居家者安住齋戒出家者安大乘齋戒此最為要故仰冀三寶諦實一切諸佛菩薩攝授二種資糧圓滿最勝力法界清淨不可思議勝力上師諸佛並其弟子在此奉受布薩之處福田降臨垂錫此諦實勝力降臨奉坐勝解想之哀愍五濁時眾生大方等經心藏義親教宗派攝持等威德諸師我敬禮世尊具大慈悲心一切種智引導師福慧功德勝海深於諸如來我敬禮清淨遠離貪慾塵善能解脫諸惡趣一味最上勝真諦寂靜妙法我敬禮已解宣說令他解善能住於諸學處具諸功德勝福田於諸僧伽我敬禮頂禮最尊正遍知頂禮宏濟正妙法頂禮廣大僧伽眾永於三寶誠頂禮明鑒十方諸眾生十方盡轉妙法輪拔濟十方諸有情十方諸佛我敬禮同心齊發希有願行道時位亦作伴一賢刦中事究竟圓滿千佛我敬禮已往無數世刦前為救眾生窮困苦誓發種種奇特願八大善逝我敬禮維衛式棄毘舍浮留孫金寂及飲光釋迦牟尼天中天勇猛七佛我敬禮無垢月面殊勝像紫摩金身我敬禮遠離塵垢三界無正等明覺我敬禮大悲世尊平等攝聞名即息惡趣苦除三毒病藥師佛瑠璃光佛我敬禮若有正覺降生處及其得成菩提處轉大寂靜法輪處無漏滅處盡敬禮善逝隨方常居住經行散步坐立地獅子臥勢安眠處如斯等處盡敬禮上方下方暨中央方隅不拘何方所凡有舍利無舍利一切寶塔我敬禮慧度不可言思說無生無滅虛空禮隨類自性智慧生三世佛母我敬禮文殊救脫祕密主觀世音等廣大行樂負度生有寂任大乘僧眾我敬禮寶光圓滿妙明心發生其身願敬禮雖作害者與安樂如是等處我歸依應真勝智諸根調與教同有久住世流通佛法作攘護十六羅漢我敬禮修觀十二因緣法自來緣覺分智果不依知識自悟證諸聖緣覺我敬禮得大變化力神通伎瑞已就承佛勅善能謹守寶法藏護教金剛我敬禮宿因廣積善施海得大壽命財穀瑞資育廕庇行道者繼諸施財讚敬禮遍於虛空佛菩薩我等眾生盡無餘分身變作剎塵數一切時中恭敬禮所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛於一塵中塵數佛各處菩薩眾會中無盡法界塵亦然深信諸佛皆充滿各以一切音聲海普出無盡妙言詞盡於未來一切刦讚佛甚深功德海拜畢各歸本位皷吹諸般樂器且作且誦云以諸最勝妙花鬘伎樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭一一皆如妙高聚我悉供養諸如來我以廣大勝解心深信一切三世佛悉以普賢行願力普遍供養諸如來止樂復誦云我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔十方一切諸眾生二乘有學及無學一切如來與菩薩所有功德皆隨喜十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪諸佛若有示涅槃我悉至誠而勸請唯願久住剎塵劫利樂一切諸眾生所有禮讚供養佛請佛住世轉法輪隨喜懺悔諸善根迴向眾生及佛道如是作七支畢右膝著地合掌誠念受布薩義云云何憶昔如來應供正等正覺如調順馬王及大象王應作者作所作已辦捨諸重擔逮得己利盡諸有結具真實語心善解脫正智解脫者彼等或以為便於眾生故為令利益故為令解脫故為令無疾病故為令無饑饉故為令圓滿菩提方法故為令增上圓滿無上菩提正覺故實受布薩禁戒如是我某人亦起於此時至於明旦日出時間實受布薩也如是誦三遍已得戒想更宜記其所戒條目誦云從今不殺生亦不取他財不行淫慾事不說虛妄語因生多過失諸酒斷不飲不坐高廣床復捨非時食不著香鬘飾不作歌舞樂如昔應供尊永斷殺生等我以如是戒願得無上果被苦擾眾生願拔出苦海誦三遍鄂嘛阿摩噶哈施伊拉薩嘛拔哈喇薩嘛拔哈喇拔哈喇拔哈喇嘛哈阿舒拔達哈薩鵽巴達嘛畢不溪伊荅不雜達哈喇達哈喇薩曼荅阿斡羅基得吽葩查娑阿哈阿是謂淨戒總持誦七遍或二十一遍堅持禁戒離垢染具足清淨無所犯離於禁戒取著等願戒波羅密圓滿如是發願以上乃受大乘布薩法也受戒畢而觀作恭敬歡喜之想歸依者歸依十方三世一切如來身語意德業元統自性出生八萬四千法蘊主宰一切聖僧具恩親教師與宗派威德諸上師歸依佛歸依法歸依僧以上如常誦之歸依世尊藥師八大善逝佛會同其眷屬三遍或七遍發菩提心為諸有情願得佛果因此奉修世尊八大如來佛會同其眷屬禮供勸祈妙意等勝道次第安住也從真如體中發四無量心我與諸有法性本來相同而尚未悟是理一切眾生願令常具安樂及安業因願令永離苦惱及苦惱因願令既無苦惱不離純樂願令悉捨愛惡親疎分別苦樂之因永處平等心虎巢大師云欲修持者先當竭力自觀無我禪定斯功既起由是發四無量心及菩提心皆為彼無明眾生故此語乃分析因果次第總以四無量心定之蓋菩提心與四無量心二種意本相同也若專發菩提心者其說具於下文發明儀軌合大師經義也四種加持中加持壇宇仰冀三寶諦實一切諸佛菩薩攝授二種資糧圓滿最勝力法界清淨不可思議勝力願謹遵七佛如來本願經中所說儀式十方如來並其弟子諸聖護法會集之壇與諸供品如彼諸佛菩薩往昔願力所感清淨佛國兼如阿密達佛極樂世界具足一切功德莊嚴其地皆是種種珍寶所成平如手掌廣大無邊無垢放光微妙觸樂柔軟適散種種天花各具牛頭旃檀香氣寶磚為垣金銀珍珠紛沙布地烏答巴拉沽穆達蓮花荏苒敷滿八功德水池沼瑩徹微妙莊飾諸般水鳥唱和雅音戲喜飛騰種種如意寶樹各樹具飾以天嘛呢珍珠瓔珞懸垂寶珠開發花菓燦然成熟時風微動懸垂金鈴搖動出妙法音行列莊飾如是豐足寶地自然成就加持房舍壇宇復次地中七寶所成無量大殿放大光明充滿無量世界纖麗非一殊勝無邊微妙無窮超出三界諸境度越世間以彼無上善根感成清淨自在覺明體相如來所住之處與諸菩薩聖僧天龍鴉嘠剎干達喇斡阿蘇喇噶嚕查金那喇嘛和喇噶人非人等無數遊戲其間以資法味恒常喜悅願度一切有情永得利益遠離一切煩惱怨害垢障永捨一切魔事一切世間莊嚴不可比擬宛如佛淨土意念大智慧徹悟決定自乘止觀入於解脫門空性無相無願寶蓮花王無量功德為飾此等無量寶殿自然成就加持座位復次寶壇中蓮花獅子寶座善名稱吉祥王如來寶月蓮花智嚴威音王如來金色無垢寶光妙行成就如來無憂最勝吉祥如來法海雷音如來法海勝慧遊戲神通如來藥師琉璃光王如來釋迦牟尼如來及十方如來菩薩一切聖神護法聚會居處敷布隨各聖者願力所感燦爛豐足自然成就加持供物復次內外一切處所隨種合宜天人最妙受用供物飲食衣服音樂奇特種種供品猶如三藏經暨普賢行願品經所載一切供物如雲如海精潔盈滿莊嚴具陳願一切聖者聚會冥加亦願垂慈納受三遍普賢供雲廣大喜悅者誦供雲總持此乃增上大利益經中所云止鄂嘛納摩拔哈噶斡得拔雜喇薩阿喇巴喇嘛喇達訥答塔阿噶答阿鴉阿喇哈得薩嘛鴉嘠薩嘛餔達達哈鴉答達鴉塔阿止鄂嘛拔雜哷拔雜哷嘛哈阿拔雜哷嘛哈阿得雜拔雜哷嘛哈阿畢達鴉阿拔雜哷嘛哈阿玻堤咨答答拔雜哷嘛哈阿玻堤曼拙巴桑嘠喇嘛那拔雜哷薩喇斡嘠喇嘛阿阿斡喇那畢碩達哈納拔雜哷娑阿哈阿三遍或七遍遍復次三寶諦實一切諸佛菩薩攝授二種資糧圓滿最勝力法界清淨不可思議勝力如是成就三遍誦供品攝授下奉請諸聖右膝著地拈花合掌而作是念所出奉請語句口誦兼作緣念東方去此過四殑河沙土從無勝清淨世界請善名佛過五𢫈河沙土從妙寶世界請寶月佛過六殑河沙土從充滿妙香世界請金色佛過七殑河沙土從離憂世界請無憂佛過八殑河沙土從法幢世界請法揚佛過九𢫈河沙土從寶海世界請勝慧佛過十殑河沙土從琉璃光明世界請藥師佛等各同無數眷屬飃然騰空無礙神通來臨而作堅固勝解為大要也善名稱吉祥王如來寶月蓮花智嚴威音王如來金色無垢寶光妙行成就如來無憂最勝吉祥如來法海雷音如來法海勝慧遊戲神通如來藥師琉璃光王如來本師世尊釋迦牟尼等十方三世現住如來應供正等正覺並一切諸菩薩願垂慈照諸世尊俱大慈悲因於五百世後像法轉時或有眾生被種種業障所纏一切惡病所逼種種苦惱所害及諸困窮所迫為救拔濟是等有情兼為與天上人間利益安樂故諸尊如來俱多善巧方便昔發本願妙好廣大由此勝力攝授無量今者因為譬如上師類中則云奉事勝威德上師戒寶之身某兼我等若圓寂則云願彼意念圓滿兼我等餘倣此如大主類中人王則云奉事極堅金剛之身某兼我等若去世則云願彼意念圓滿兼我等至大德類中或長老或出家如語王義成者則云奉事語王義成兼我等若去世則云願彼免諸惡趣而得解脫兼我等如世間類中施主則云奉事福盛兼我等若去世則云願彼免諸惡趣而得解脫兼我等其或有名而不知者如復立法輪寺廟則云奉事大眾師徒之身兼我等如居家類中施主福祿夫婦子嗣與諸眷屬奉事兼我等以上諸條略舉大凡隨時詳為斟酌增減用之兼為我等與諸眾生作依怙之故應請在此奉供壇場降臨作大集會攝授垂錫現在我等本師世尊釋迦牟尼文佛因有所化然雖南洲示滅現在他方世界自在遊戲種種利益眾生願如來大慈大悲追念昔發本願憐我等已屬宏化內攝所覆得末法之恩今者因為某人云云兼為我等與諸眾生作依怙之故應請在此奉供壇場降臨作大集會攝授垂錫文殊室利菩薩摩訶薩佛子救脫金剛手等一切菩薩摩訶薩昔者曾於七如來發本願功德經說此法時在大會中攝授經義成就如來妙法發心者今為某人云云兼為我等與諸眾生作依怙之故應請在此奉供壇場降臨作大集會攝授垂錫昔者如來普於法會當面授付之時各各以天實語許諾擁護七如來本願功德經正法及四眾以為己任所謂釋提桓因大梵天帝持國天王增長天王廣目天王多聞天王等諸聖護法今為某人云云兼為我等與諸眾生作依怙之故應請在此奉供壇場降臨作大集會攝授垂錫昔者如來普於法會七如來昔發本願功德經受持供養等有情皆許諾擁護以為己任所謂極畏藥叉大將金剛藥叉大將執嚴藥叉大將執星藥叉大將執風藥叉大將居處藥叉大將執力藥叉大將執飲藥叉大將執言藥叉大將執想藥叉大將執動藥叉大將圓作藥叉大將諸藥叉大將追念昔日美妙勝意今為某人云云兼為我等與諸眾生作依怙之故應請在此奉供壇場降臨作大集會攝授垂錫以上四節分行細字按番經俱云奉事上師戒寶之身蓋舉一以例其餘恐觀者不明晰今按舊譯改之無有往來損益身隨機應感即現相猶如皓月昇太虛照臨為破世間暗奉請善逝出有壞我等已具善福分今特獻此功德水伏願怡然哀納受諸尊法體自清淨雖無愛等塵纏縛願為我等淨障緣奉此淨水請沐浴諸尊如來同其子更以寶瓶注香水如意盈滿發唱頌並作伎樂奉沐浴持是殊勝無比衣且熏淨香拭尊體於彼華餙善辨色極香妙衣謹奉獻輕薄柔軟天繒服於彼不壞金剛體我以不退信呈獻願我亦得金剛身煩惱渴捐諸有情沾濡法水充滿故脫愆成就諸緣義因此奉獻淨瓶水說法清淨道場也敷設威德清淨座禪定不動平等持勝意欣然請安住廣大清淨寶座上示現無礙無障身善住平等圓容性合和供品俱納受八大如來各於所在世界乘自然通騰空而來降臨壇中八大獅子寶座上欣然而住經夾亦住中央中級階上本經序中所載菩薩及一切諸菩薩無量眷屬俱住其位於其面前文殊救脫金剛手菩薩三尊會坐一處追念往昔說法願力助作善事業想之第三級階左列十二藥叉大將之位右列梵天帝釋之位四門四天王各各成就誓願而住其位想之供養及壇場同前依諦實力法勝解作也復次正宗分如是想後通禮供養功德水等竭力供獻如是說者略說通禮供養廣說各禮供發願有二第一拔濟天人眾生淨梵子勝法王子文殊室利尊聖教根本大師善寂養正座帝堅四位我敬禮聖天之子薩持納勒伊鉦氳重訂新語文字座髮髻能忍苦行天溝金剛德主宰護光四位我敬禮敬信三寶最上德輪堅聖教誠敬安帝日光尊主宰妙大法王吉祥帝天中上師四位我敬禮執財守護主宰天中帝眾尊族姓大德光明帝雪嶺最親一天頂尊帝番地降冤四位我敬禮大善知識舒蘭智慧稱羊地獨泉茂盛法幢師芙川聖教日光卓摩車正覺修觀四位我敬禮高族降生心藏吉祥幢無比藥溝遍喜願路足草舍上師名稱威德賢尚師福稱四位我敬禮法溝大師寶名吉祥幢如真文殊菩薩寶幢足持律最上尊勝號妙手遍喜智慧四位我敬禮大慇懃戒防非福祿師除謬普賢勢力德熾師決定一切種智慧憫足自在極堅四位我敬禮遍主世尊福德最具祥根本有恩法師沙嚕巴居處法師意子廣博師寶珍巨海三位我敬禮妙語俱期礪藏勝智慧俱期千萬之數也住持金剛最上二位師得此法恩語王智慧名賢刼妙海二位我敬禮正覺修觀隨持虛空稱大善知識福德智慧足正遍知覺尚師福德稱無比降旨三位我敬禮聖教根本玻堤薩鵽尊族主玻堤薩鵽次小足薩和喇法中之王善吉祥低伊巴嘛嘠阿喇四位我敬禮聖教命木天德菩提光拔濟有情帝思廣大號菩薩嘛哈阿薩鵽月幢師公波譯師四位我敬禮煩惱眾冤能破勝幢師加斡自在俊妙美名熾加斡德妙謹戒具妙行功德自在四位我敬禮廣大功德商巴持律師法師菩薩尚師福稱等八大如來本願儀軌經宗派上師諸尊我敬禮如是畢復二偈乃虎巢大師所補云雪嶺利益福祿出生門勝劣遍修皆可為之道法王勝意本願儀軌經持護流通諸尊我敬禮二利究竟導師正等佛二諦雙融聖教正妙法二足受持最勝眾僧伽歸依處所三寶我敬禮此宗派皆我所得授者因據實書寫若自已別得師傳其上師實數一一察出恭敬入之不可以非己師者訛言也亦不得以己心各自所愛門頭取入以炫為希有之宗派蓋世間之大愛者雖如父母等諷誦時亦不可擅取入也詳叅頂禮供養歸依十方三世善逝並諸弟子頂禮供養歸依應供正等正覺善名稱吉祥王如來與其侍奉無量無邊百千萬億菩薩圍繞頂禮供養歸依應供正等正覺寶月蓮花智嚴威音王如來與諸菩薩圍繞頂禮供養歸依應供正等正覺金色無垢寶光妙行成就如來與其無量菩薩百千萬億圍繞頂禮供養歸依應供正等正覺無憂最勝吉祥如來與其無量菩薩眷屬頂禮供養歸依應供正等正覺法海雷音如來與其無量眷屬菩薩圍繞頂禮供養歸依應供正等正覺法海勝慧遊戲神通如來與其無量菩薩圍繞頂禮供養歸依應供正等正覺藥師琉璃光王如來與其眷屬菩薩日光遍照月光遍照等無量菩薩勝體昭煥同帝青寶色相好光明千日熾虛空普遍寂樂成就分別性世尊藥師勝身我敬禮法語宣布聆如琴千弦清淨梵音種種所化意普令充足善解法海藏世尊藥師妙語我敬禮若有意者智慧法海間無緣大悲波浪所興動一切願海佛事自成就世尊藥師勝意我敬禮頂禮供養歸依本師世尊如來應供正等正覺釋迦牟尼文佛與其眷屬三萬六千菩薩破無明暗最勝炬除苦惱病希有藥一切離欲妙法寶頂禮歸命奉供養如是等頂禮供養歸依聖者文殊童子及救脫金剛手等菩薩摩訶薩頂禮供養歸依大梵帝釋四大天王等一切護法頂禮供養歸依極畏藥叉大將等十二藥叉大將於此聖會供奉德水塗香妙花熏香明燈食物雅樂寶蓋幢幡等現今盡力備設此供十方所有無主所拘天上人間妙物安樂所用一切豐足或呪覺明勢力勝信力感發所生雲供猶如普賢行願品中所說大海虛空無邊無際一切盈滿奉供獻者今為某人云云兼我等從無始來在輪轉時一切生身中作不善業略言之如所不應作者作應作者不作等所有正罪一切誠心懺悔三世聖凡所作諸善根一切福德今皆隨喜十方諸佛勸請轉無上大法輪作世間明燈若有將欲示入涅槃者於是發一切誠心仰祈永莫入滅勸請常住世界利益眾生如是所作一切福德自他無遺因而迴向令得現證無上菩提之因按番經此節內分行細字與前四節分行細字同今亦按舊繹改之世尊會集法壇願垂慈念諸佛具大慈大悲專為未來五百世後像法轉時有情眾生被種種惡業所纏一切惡病所逼種種苦惱所害及諸困窮所迫以為救度是等有情兼為於諸天人作利益之故往昔七佛世尊如來應供正等正覺善巧方便昔發廣大本願攝授加被不可思議現在我等本師世尊釋迦牟尼如來親口宣揚並為攝授暨聖者文殊救脫金剛手等諸尊菩薩摩訶薩往昔世尊所說真實意行廣大圓滿作為威就本經義業察明聖語應許攝授梵天帝釋四大天王十二藥叉大將等擁護妙法諸大近事今在法會前於說本願功德經時凡諸受持本願功德經之有情者應諾擁護救濟云何應諾以為先聖之所熏被又如本願功德經中所說諸尊如來並其弟子在此聚會築設壇場盡力敷陳合和供品法會壇前稱揚嘉號奉獻供物祈望恩指在於會前如昔云何攝授所說本願功德經儀軌現作圓滿利益如是所得一切恩惠願為某人云云兼我等速得垂錫亦同前按舊譯改之以下分行細字凡有同此者俱按舊譯改之世尊會集法壇願垂慈念諸尊聖者具足洞照智慧憐憫慈悲妙行事業救濟勢力不可思議皆為利樂發生之故伏願佛教興隆掌教諸位上師身安壽長白法事業漸見增廣十方眾僧咸得安和而其十種法行一切受持增長圓滿流通依是勢力所感一切有情咸得安樂且特現前施主而為上首一切有情淨消二障圓滿二資而速疾得成正等正覺願賜冥加復次龍樹菩薩云四無量禮如是說者蓋佛境無量自身變化無量為利眾生無量故尋無量手獲得功德無量如施伊拉拔哈達喇經中所載四無量所謂四無量因意念同也信解殊勝德水等具足八功德水波鬘微動浪如瓔珞行列無數自身變化亦如是狀而以奉身烏闍嘛巴阿喇花曼達阿喇花蓮花烏答巴拉花拔沽拉花等天上人間雜色妙花盈滿虛空而奉頭上赤白栴檀蛇心沈香闍嚕嘎香香麫未番種種藥草焚熏厚如雲體而以奉鼻塵器世界而作燈碗糧油百草津液禾油如海填滿須彌以為燈心燃燈無邊光明能超日月而以奉眼六香氷片栴檀等妙香合和妙藥塗香如殑河流而奉心間天龍鴉嘎剎人等諸般熟食及未熟食微妙九品百味食物而以奉舌籥器笛銛子皷桑皷等世間音聲盈滿而以奉耳復又傘蓋幢幡彩鬘七珍八寶八吉祥等為所供之物或有真設或作有相心中多端變化皆有主所拘供養須彌山金山遊海四洲日月等是無主所拘供養身或作如意寶或作寶宮殿復作役使隨說成就乃為奉身供養以上雪供誦總持呪力感如普賢雲供成就者是為總持供養於是供養遠離限量不可思議者是為勝解供養迎請如來同其眷屬乃為依力昔已造之罪如毒入腹生極悔心者乃自責之力從今至於命難而不復作者復退過力如上所說禮供於勝義中亦無自性世俗中一切自他之罪障兼我等如是說時諸佛菩薩從心間放大光明猶如能醫而用嘔吐之藥將病引出自身淨如水晶勝信解者乃對治遍行力懺悔自他一切三時所作之善心生歡喜三千須彌衡時得限量隨喜功德較彼無限量如是他善作隨喜者得福平等有此利益太子一切善成成佛不遠時圓明無為寂滅離緣起猶如甘露妙法我今得然雖宣說究亦誰能知故且不語住於山林中於此示現不說法時如梵天持千輻輪奉獻祈禱今即如自手持輪各隨所化界想根基祈請轉妙法輪諸佛菩薩為利有情雖六時不遺但諸有情煩惱熾盛故心生厭離欲歸於寂者懇祈為利眾生永住一刦不應涅槃勸請住世將無邊善法迴向究竟菩提者無盡意菩薩請問經中有長行義有一祕訣師所云云何廣大海中一滴水乃至海水不盡是無盡如是迴向菩提諸善根乃至不得菩提是不盡如如是善根迴向菩提因者與時無盡殊特支是也如是七覺支即同於耕種秋果熟實是故勸請勝意於諸勝境處猛力專念往昔所發勝意奉求現今我等隨願成就如是名謂總祈諸勝意成就奉供因即禱祝也第二廣演各各禮供發願中八如來妙法僧伽兼成就總持寶瓶等其八如來初於善名向下請聖一一奉供發願作之第一善名稱吉祥王如來名號誦之奉供發願頂禮供養歸依世尊應供正等正覺善名稱吉祥王如來誦七遍今時不誦七遍作易法者甚多則成增減而大有妨礙故為剋定方好此間奉供之法亦如上於此聖會等六支增補誦之以下悉皆倣此諸佛子等今在眾會道場善名稱吉祥王如來前聞號憶念虔誦七遍並禮讚供養等善力善名稱吉祥王如來應佛當時所發本願某等願為一切眾生若有身受種種痛苦熱病鬼魅呪詛起屍等難種種逼切皆作災害一切病症頓時息滅乃至究竟菩提無熱病罪業之鬼魅一切病症善消除之某等願為一切眾生若有盲聾顛狂白癩諸病所困願彼等乃至究竟菩提諸根具足一切苦惱病患悉能斷絕某等願為一切眾生若有貪嗔痴障覆者或作五逆之罪多行非行之行誹謗正法作種種不善業罪墮三途地獄彼等眾生已生於地獄受諸般苦楚願彼等一切五逆之罪惡業障等一切盡能消除乃至無上正等正覺究竟不行眾生地獄及惡道中常受天宮天樂人樂某等願為一切眾生若有窮困乏匱飲食衣財米穀臥具香鬘諸物願彼等乃至究竟菩提資生金銀衣財米穀臥具香鬘受用諸物某等願為一切眾生若有纏縛捶撻入於監牢兵刃等身受種種苦惱願彼等乃至究竟菩提一切纏縛捶撻常令解脫斷絕一切身中煩惱某等願為一切眾生若有無依怙者身煩火熾誤入獅子虎豹熊羆毒蛇之處至於命難可憐愍者願彼等乃至究竟菩提身中煩火一切息滅獅虎熊羆毒蛇等皆生慈心無畏安住善地某等願為一切眾生若有互相鬪爭言訟惱亂驚恐怕懼願彼等乃至究竟菩提鬪爭言訟一切息滅互相慈心安住某等願為一切眾生若有乘船入於江海至無有洲渚欲求活命種種叫苦願彼等乃至究竟菩提江海之中安然得出無畏渡過願此身遷沒時即往應供正等正覺善名稱吉祥王如來佛土蓮臺獅子寶座內化生往生之後總持禪定等一切功德現前無上導師善名稱吉祥王等及十方一切諸佛親得授記心生歡悅剎那剎那間無礙入於諸佛國土往昔最勝如來佛曾說弘深八大願依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道第二威音王如來頂禮供養歸依世尊應供正等正覺寶月蓮花智嚴威音王如來七遍此間奉供六支同前諸佛子等今在眾會道場寶月蓮花智嚴威音王如來前聞號憶念虔誦七遍並禮讚供養等善力寶月蓮花智嚴威音王如來應佛當時所發本願某等一切眾生若有為營農業或商賈事令心種種擾亂故於菩提方分諸善法等與菩提之心作意亡失迷於輪迴各受輪轉種種之苦病老衰亡憂嘷叫苦意不安樂無邊擾感一一當受願彼等一切消除乃至無上菩提正遍知覺飲食衣服受用資生之具財穀金銀所得豐足令諸善法增長亦不捨離菩提之心所作惡道有情地獄等一切輪迴苦難咸得解脫某等一切眾生若為寒暑饑渴煩熱逼身受大苦惱可憐愍者願彼等一切宿業障覆悉皆消除乃以是身而為最後之身乃至無上菩提一切生苦悉得解脫受人天樂復次若有女人種種疾病逼迫其身更兼女身所為下劣臨當產時受大苦惱願彼等一切苦惱悉皆斷除乃以是身而為最後之身乃至究竟菩提常為男子某等一切眾生若遇死厄冤對行險難處為賊所侵與其父母兄弟姊妹親友眷屬受諸苦惱悲泣痛戚而逼其身願彼等一切解脫乃至究竟菩提死厄冤難險處被害一切消滅悲泣苦惱悉皆遠離某等一切眾生若遇昏夜行於黑暗之處成辦種種緣事被惡鬼神之所惱亂畏懼大聲叫哭願彼等一切消釋乃至究竟菩提凡諸黑暗已無所有最惡鬼魔悉皆解脫皆其供養奉事所作種種殷勤之故某等一切眾生若有下劣識解智慧甚少舉念愚癡善法根力菩提覺支禪定諸總持門及佛法僧隨念亡失願彼等一切覺悟乃至究竟菩提禪定正念根力諸總持門諸菩提支現前成就隨大智慧行之無礙某等一切眾生若有下劣識解欲求聲聞及獨覺乘者修行而住棄背無上勝妙菩提願彼等一切頓除乃至究竟菩提於無上正等正覺永不退轉決定超越聲聞獨覺之地作意菩提永不捨離某等一切眾生或逢大劫將盡之時雜嘛餔低伊州火遍發起被火焚壞悲泣憂惱由彼前身惡業力故受斯種苦無歸無依願彼等一切苦惱憂悲悉皆遠離受清涼樂願此身遷沒時即往應供正等正覺寶月蓮花智嚴威音王如來國土蓮臺獅子寶座內化生往生之後總持禪定等一切功德現前無上導師寶月蓮花智嚴威音王等及十方一切諸佛親得授記心生歡悅剎那剎那間無礙入於諸佛國土世尊威德妙音王曾發弘深八大願依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道第三金色無垢如來頂禮供養歸依世尊應供正等正覺金色無垢寶光妙行成就如來七遍此間奉供六支同前諸佛子等今在眾會道場金色無垢寶光妙行成就如來前聞號憶念虔誦七遍並禮讚供養等善力金色無垢寶光妙行成就如來應佛當時所發本願某等一切眾生或有造作種種屠害不善之業斷諸生命由斯惡業故壽夭多疾水火刀毒諸病死亡願彼等一切惡業纏縛悉皆消滅常壽無病無論何時不至死於非時某等一切眾生或作種種不善業罪盜他財物故感生貧窮家乏少衣服饑渴逼身常受諸苦願彼等一切頓消諸罪乃至究竟菩提自在豐盛得無不備某等一切眾生若有各懷毒害之心互相殺害鬪爭願彼等一切消釋乃至無上菩提正遍知覺互相憐憫猶如父母某等一切眾生若有貪嗔癡障毀犯禁戒遍行諸罪傷損學處受用信施故墮三塗眾生地獄願彼等一切所有業障悉皆消滅出離一切遠近煩惱乃至菩提道場時實持戒律於身語心善能防護永不捨離菩提心答達鴉塔呵西達棏西達棏蘇西達棏摩匝尼摩嘠剎呢穆嘠得畢穆嘠得阿嘛勒畢嘛勒嘛嘛噶拉葉希喇那鴉噶喇白喇答納噶喇白薩喇斡阿喇塔薩阿達哈尼巴喇嘛阿喇塔薩阿達哈尼嘛納塞嘛哈阿嘛納塞阿達不得阿答鴉達不得必伊答拔哈鴉蘇拔喇吶巴喇哈嘛郭磕巴喇哈嘛呵達哈溪得薩喇斡阿喇特窟阿巴喇阿資得薩喇斡答喇阿巴喇隄哈得匝都斯卡卡蚩餔達達哈鍋支拔哈阿溪得納嘛嘛薩喇斡答塔阿噶答阿難阿娑阿哈阿世尊金色無垢寶光妙行成就如來昔坐菩提樹下普觀有情被貪嗔癡障所覆諸惡疾病逼身死難冤愆臨險被害壽活一劫墮入地獄受大苦惱為利斯等令入菩提正遍知覺盡消一切業障故宣說根本總持誦此真言攝授我等一切眾生五無間等罪悉皆消滅一切冀望皆得圓滿臨命終時亦得金色無垢寶光妙行成就如來而護念之願此身遷沒時即往應供正等正覺金色無垢寶光妙行成就如來國土蓮臺獅子寶座內化生往生之後總持禪定等一切功德現前無上導師金色無垢寶光妙行成就等及十方一切諸佛親得授記心生歡悅剎那剎那間無礙入於諸佛國土世尊金色無垢光曾發弘深四大願依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道第四無憂最勝如來頂禮供養歸依世尊應供正等正覺無憂最勝吉祥如來七遍此間奉供六支同前諸佛子等今在眾會道場無憂最勝吉祥如來前聞號憶念虔誦七遍並禮讚供養等善力無憂