廣大圓滿成就某等一切眾生或犯王法幽禁牢獄枷鎖鞭撻以至極刑復有眾多苦楚逼切並其身語意之憂惱遠離敖慢願彼等依我福力一切災害皆得解脫某等一切眾生或因饑渴所惱為求食故殷勤造眾惡業願以隨得上色香味飲食隨意飽滿復以法味令住安樂某等一切眾生或身無衣服窮困苦惱寒熱蚊虻晝夜受苦迫切彼等我願隨其所好即得染種種上色妙衣寶嚴塗香花鬘伎樂等物一切眾生有所冀望皆令豐滿成就聖者歡悅禁戒煩苦惱熱皆得解脫令住安樂願此身遷沒時即往應供正等正覺藥師琉璃光王如來國土蓮臺獅子寶座內化生往生之後總持禪定等一切功德現前無上導師藥師琉璃光王如來等及十方一切諸佛親得授記心生歡悅剎那剎那間無礙入於諸佛國土世尊藥師琉璃光曾發弘深十二願依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道第八釋迦如來頂禮供養歸依導師世尊應供正等正覺威勝釋迦牟尼如來七遍此間奉供六支同前諸佛子等今在眾會道場釋迦牟尼如來前聞號憶念虔誦七遍並禮讚供養等善力導師釋迦牟尼如來為某等一切眾生或被種種業障纏縛諸病痛切種種憂苦逼迫窮困乏少深為憐愍是等有情利益人天得安樂故由是宣揚七佛善巧方便並昔發本願攝授經中作如是言曼殊室利是故欲求一切功德成就者不雜煩惱念誦七佛如來名號晝三時夜三時意念崇重敬信造佛形像花香燈塗食物伎樂等奉供品物受八關齋淨潔七日安寓淨處發願往生彼佛國土觀一切眾生發慈悲心復有呪曰答達鴉塔阿𮗯墨𮗯墨伊墨尼密希嘛隄嘛隄薩巴答答塔阿噶答薩嘛阿達哈鴉堤卡蚩得阿得嘛得巴阿勒巴阿巴碩達哈尼薩喇斡巴阿巴嘛納阿沙鴉嘛嘛餔達棏餔達姼答答墨烏墨沽墨餔達達哈嘠徹答喇巴哩碩達哈尼達哈墨尼達哈墨墨嚕墨嚕墨嚕旆喀哷薩喇斡阿嘠阿拉密喇答淤尼拔阿喇呢餔達棏蘇餔達棏餔達達哈阿堤卡叉阿納喇嘠欃都墨薩喇斡德斡薩墨阿薩墨薩嘛納斡阿哈㘕都薩喇斡餔達達哈玻堤薩鵽沙墨沙墨巴喇沙曼都墨薩喇斡伊答淤巴達喇斡拔鴉阿答鴉斯逋烏喇吶逋烏喇呢逋烏喇鴉墨薩喇斡阿阿沙阿鴉白厄朱鴉巴喇隄拔哈阿塞薩喇斡巴阿拔嘛嘠剎央嘠哩娑阿哈呵此名碧琉璃光總持若有善男子善女人供養受持讀誦滿一千八遍彼諸如來悉皆護念諸菩薩亦皆憶念執金剛菩薩真實擁衛諸天並帝釋梵天四大天王亦皆擁護所有五無間罪一切業障悉皆消滅無諸病患長壽延年非時死難皆得解脫亡難冤難曠野賊難鬪爭詞訟盡得消除遠離冤害有所希求無不隨意如是所說一切因為某人云云兼利我等於藥師儀軌經中七如來釋迦導師如來海會眾前供養興願念誦神呪云何攝授隨意俱獲利益如是所說某等一切眾生速得垂錫世尊正等釋迦佛宣揚琉璃呪利果依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道第二法寶破無明暗最勝炬除苦惱病希有藥一切離欲妙法寶頂禮歸命奉供養七遍奉供六支同前如來真實妙旨正量不變之體惟願我等現前宣說垂錫真義聞號消愆功德生如來所宣不易果依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道第三僧寶文殊菩薩頂禮供養歸依聖者文殊室利菩薩摩訶薩心離一切過咎塵垢身具眾德清淨光明威儀莊嚴足依蓮花天人阿蘇喇龍及持明仙等擁圍髮髻頂著寶冠摧破三惡道諸苦眾生七遍奉供六支同前世尊聖者文殊室利憐愍惡世眾生被種種業障所蒙諸般疾病所纏憂愁苦惱所逼一切邪見所迷漸漸下墮諸惡道趣為憐愍是等有情或有聽聞此經者於無上菩提不得退轉諸罪業障一切悉皆消滅罪魔不侵一切災害不如意事皆得消散凡所欲求一切順緣隨意成就為此七藥師如來名號及本願功德經因在大法會中特白導師世尊釋迦牟尼佛言世尊後像法轉時若有持誦本願功德經為他廣大演說若自書或令人書造成梵本敬信尊重以種種花香末香燒香花鬘塗香幡蓋供養我於彼善男子善女人種種稱揚藥師琉璃光王如來名號乃至睡中亦以佛名令其覺悟以五花繒綵而裹帙之供於淨處有是經處四大天王與其眷屬及餘無量百千天眾皆詣其所受持是經者無復橫死一切皆不能奪其精氣設有奪者還復如故此等所說皆如聖言真實正量許諾今在合和供品壇宇之中受享供養海會如來共憶前緣補修儀軌聖事流通本經所說一切饒益令我等一切眾生速得成就攝授垂錫文殊深廣本願經殷勤祈請利益果依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道救脫菩薩頂禮供養歸依救脫菩薩摩訶薩七遍奉供六支同前世尊聖者救脫憐愍惡世困苦眾生興大慈心於其導師世尊海會眾前而作是言大威德世尊於後末世像法轉時若有眾生常為諸病苦之所惱逼身形尫瘦不能飲食喉唇乾燥死相現前父母親屬朋友知識啼泣圍繞目視皆暗見彼琰魔法王之使身臥彼處引其神識將至琰魔法王之所有俱生神隨其所作善惡之業悉皆記錄授於琰魔法王琰魔法王即依法律問其所作隨彼福罪而處斷之若有為是病者歸命藥師琉璃光王如來如法供養而彼神識或經七日或三七日或五七日或七七日如從夢覺復本精神既還憶知善不善業所得果報由自證見乃至命難亦不造惡供養法則復告大德阿難若有欲脫大病難者為是病人七日七夜授持布薩八支齋法應以飲食及其資具隨其所有供養奉事比丘僧眾晝夜六時誠誦藥師琉璃光王如來名號復誦此經四十九遍燃燈四十九日造像七軀一一像前各置七燈一一燈量大如車輪乃至四十九夜光明不絕復造五色綵旛四十九首復次大德阿難若剎帝利灌頂王等所謂病難或自界及其他國侵逼難星宿變怪難日月薄蝕難非時風雨難過時不雨難人眾疾疫難種種攪亂不安之時彼剎帝利灌頂王爾時當於一切有情起慈悲心放大恩赦脫諸苦惱如前法式供養彼藥師琉璃光王佛彼灌頂王由此善根及藥師琉璃光王如來本願力故令其國界安穩豐歲風雨順時穀稼成熟國內眾生無病安樂最勝歡悅彼國暴惡鴉嘠剎喇嘠剎出生噉食之鬼神等惱亂有情不得其便一切惡相悉皆不見而灌頂王皆得增益壽命色力無病自在此等所說皆如聖言真實正量許之今在合和供品壇宇之中受享供養海會如來共憶前緣補修儀軌聖事流通本經所說一切饒益令我等一切眾生速得成就攝授垂錫救脫愍病失界等息炎獲樂興願果依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛普令有情得安樂無明煩惱總消除速成無上菩提道金剛手等頂禮供養歸依威德金剛手菩薩摩訶薩等與眾菩薩七遍頂禮供養歸依大梵帝釋及持國增長廣目多聞四大天王等諸天近事護法天神三遍此間奉供六支同前將此豐饒供品奉進十大鎮方之神及四大天王同其眷屬願令佛法熾盛眾生常得安樂金剛手菩薩摩訶薩與大梵帝釋及持國增長廣目多聞四大天王等護法近事諸天尊神云何昔在海會眾前天以實語同音啟白佛言世尊我等已聞七佛本願親見諸佛如來親承供養復次世尊隨於何處持誦七佛名號及𭌸喇呢章句流通供養我等本部眷屬共詣其所若有善男子善女人持誦供養書寫我等同往其處善男子善女人國王大臣受持書寫本願尊經者承佛神力悉皆擁護城邑方域盡得擁護死難冤難壙野災難一切病疾悉皆消散我等追念如來慈愍一切有情即報佛恩令諸橫死皆得退散鬪爭詞訟皆得消滅所有意念隨願成就身心安樂受用自在財穀增長一切時中無不守護世尊我等親於佛前自立誓願若有敬信男子女人憶念我者應誦此呪答達鴉塔阿阿𮗯嘛𮗯答喇𮗯嘛嘛𮗯𮗯哷哈乎呵嘛喇嘛喇嘛喇嘛喇徂徂哷徂哷娑呵哈阿若復有人誦七佛名及此神呪讀誦自書或令人書恭敬供養當知是等不墮三塗彼人於無上正等正覺復不退轉彼諸佛土隨意受生常見諸佛得宿命智總持禪定無不具足如是所說親口許之復次金剛手菩薩而白佛言若有受持本願尊經者為利是等有情今我更說𭌸喇呢呪諸佛世尊護念於我頂禮七尊正等正覺頂禮一切執金剛答達鴉塔阿鄂嘛拔雜哷拔雜哷嘛哈阿拔雜哷拔雜喇巴阿商達哈阿喇呢伊薩嘛薩嘛薩曼答阿巴喇隄哈答拔雜哷沙嘛沙嘛巴喇沙曼都薩喇斡拔鴉阿達哈鴉沽嚕沽嚕薩喇斡嘠喇嘛阿呢薩嘛鴉嘛孥薩嘛喇拔哈噶斡阿納拔雜嘛喇巴阿呢薩喇斡阿商墨巴哩逋烏喇葉娑阿哈阿世尊復若有人持七佛名及本願功德經並持此呪讀誦演說我令是人所願滿足一切善法皆得成就欲見我者當書此經造七佛像并執金剛像皆以身像安佛舍利以如來所說如上法式種種花香燈塗瓔珞莊嚴伎樂供養旋繞復誦總持祕密神呪亦於眾生興饒益慈愍心受持八支聖道齋戒三時澡浴三時換衣從白月八日至十五日每日誦呪一百八遍我於其夢中即自現身共為言說隨其所求皆令滿足此等所說皆如聖言不變正量許之今在合和供品壇宇之中受享供養海會如來共憶前緣補修儀軌聖事流通本經所說一切饒益令我等一切眾生速得成就攝授垂錫復願七佛本願功德經等甚深妙法永遠熾盛一切修行門路所有間斷阻隔一切魔障或於此方為人畜病及旱澇雹霜害苗稼者令其災難惡相示顯多端不祥之兆於諸有情懷恨惱心種種邪魔魑魅魍魎在此界內或止或遊一切等類因為某人云云兼為我等或宿因種怨或現結惡緣或由地理所礙或係祖先累厄諸般作殃被禍因為某人云云兼為我等或侵犯身命國界自在眷屬應用什物等一切妖怪厲鬼作種種災殃惱害有情悉以妙用方便全然調伏而令棄彼懷讐之心發彼柔善慈心先前不祥并其諸般惡行悉皆捨離後不復造一切惡業亦令彼眾現今聖會壇前受盟不負誓言聖業流通垂錫密主諸天發誓願宣呪修法金剛手依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛特為檀越為上首眾生消障圓滿足退散魔部胥順緣十二藥叉大將具威德十二近事頂禮供養歸依極畏藥叉大將頂禮供養歸依金剛藥叉大將頂禮供養歸依執嚴藥叉大將頂禮供養歸依執星藥叉大將頂禮供養歸依執風藥叉大將頂禮供養歸依居處藥叉大將頂禮供養歸依執力藥叉大將頂禮供養歸依執飲藥叉大將頂禮供養歸依執言藥叉大將頂禮供養歸依執想藥叉大將頂禮供養歸依執動藥叉大將頂禮供養歸依圓作藥叉大將三遍此間奉供六支同前供此豐潔品物奉進諸藥叉大將與其侍從祈令佛法熾盛復祈消除檀越一切障難誠心仰叩十二藥叉威德近事神將并其眷屬一一各有七億七億藥叉同垂明鑒憶念往昔海會眾前天以實語同音而白佛言我等今者蒙佛威力得聞藥師琉璃光王如來名號我等於諸惡趣無復怖畏因此我等相率皆同一心乃至盡形歸依佛歸依法歸依僧誓當荷負一切有情為作義利饒益安樂隨於何處城邑聚落空閒淨野此經流布之處或復受持藥師琉璃光王如來名號恭敬供養者我等眷屬衛護是人既恒擁護令脫眾難所有願求悉皆滿足所說如是存念勝意爾時世尊稱言汝等念報藥師琉璃光王如來恩德者常應如是利益安樂一切有情善哉善哉隨給宣說如是今在合和供品壇宇柔善眷屬發慈愍心受享供養共憶前緣補修儀軌聖事流通本經所說一切饒益令我等一切眾生速得成就攝授垂錫復願七佛本願功德經等甚深妙法永遠熾盛一切修行門路之中間斷阻隔一切魔障或於此方為人畜病及旱澇雹霜傷苗稼者令其災難惡相示顯多端不祥之兆於諸有情懷恨惱心種種邪魔魑魅魍魎在此界內或止或遊一切等類因為某人云云兼為我等或宿因種怨或現結惡緣或由地理所礙或係祖先累厄諸般作殃被禍因為某人云云兼為我等或犯身命國界自在眷屬應用什物等一切妖怪厲鬼作種種災殃惱害有情悉以妙用方便全然調伏而令棄彼懷讐之心發彼柔善慈心先前不祥并其諸般惡行悉皆捨離後不復造一切惡業亦令彼眾現今聖會壇前受盟不負誓言聖業流通垂錫藥叉見諦本願經立誓真實護擁果依佛慈悲攝授力一切眾生悉成就唯願佛法常熾盛特為檀越為上首眾生消障圓滿足退散魔部胥順緣齋地神將此五欲功德具足廣大施食奉獻堅牢地神天女而為上首在在處處此句按番文係番地雪嶺今改為在在處處護國佑民一切神祇暨此當方守護天龍示母十二神等一切大力非人諸神受享施食畢而我師徒并眷屬合寺在府第精舍誦經師徒改主僕合寺改合府大眾修道之時願除違緣隨意成就一切順緣一一奉供發願已竟此間誦總持呪如作沐浴云第四兼修總持者此間觀想攝授總持寶瓶故為是言答達鴉塔阿𮗯墨𮗯墨伊墨尼密希嘛隄嘛隄薩巴答答塔阿噶荅薩嘛阿達哈鴉堤卡蚩得阿得嘛得巴阿勒巴阿巴碩達哈尼薩喇斡巴阿巴嘛納阿沙鴉嘛嘛餔達棏餔達姼答答墨烏墨沽墨餔達達哈嘠徹答喇巴哩碩達哈尼達哈墨尼達哈墨墨嚕墨嚕墨嚕施喀哷薩喇斡阿嘠阿拉密喇達淤尼拔阿喇呢餔達棏蘇餔達棏餔達達哈阿堤卡叉阿納喇嘠欃都墨薩喇斡德斡薩墨阿薩墨薩嘛納斡阿哈㘕都薩喇斡餔達達哈玻堤薩鵽沙墨沙墨巴喇沙曼都墨薩喇斡伊答淤巴嘛達喇斡拔鴉阿答鴉斯逋烏喇吶逋烏喇呢逋烏喇鴉墨薩喇斡阿阿沙阿鴉白厄朱烏喇鴉巴喇隄拔哈阿塞薩喇斡巴阿拔嘛嘠剎央嘠哩娑阿哈阿隨便多少誦之納摩拔噶斡得白厄卡雜葉沽嚕白厄朱烏喇鴉巴喇拔哈喇阿雜阿鴉答塔阿噶答鴉阿喇哈得薩嘛鴉嘠薩嘛餔拔哈鴉答達鴉塔阿鄂嘛白厄卡雜葉白厄卡雜葉嘛哈阿白厄卡雜葉白厄卡雜葉喇阿雜阿薩穆達噶得娑阿哈阿此呪宜多誦之由誦呪力感格八如來并其眷屬勝意即從彼佛身中放無量光明化流入沒瓶水而攝授之矣將瓶水亦浴佛身或本人及他人而浣洗之若為亡人則以此水灑其屍上等有大利益不誣想之第三次收末賽願法敬禮者拔濟天人眾生淨梵子起宗派上師諸尊我頂禮至此十五偈六十句同前誦之清淨勝相敷妙花八十種好妙果身若見聞者蒙護念導師善名我敬禮寶月蓮花勝莊嚴智慧盡知諸物性如海甚深微妙語威音王佛我敬禮瞻部河金勝光明威德熾盛超千日猶如無垢金樹身金色無垢我敬禮永得涅槃勝安樂消除有情苦惱熱常為六道眾生主無憂勝佛我敬禮廣大法音破彼難如海甚深微妙語悉除眾生三種毒法揚海音我敬禮法慧難解深際理清淨法界為遊戲現前能觀物性者神通如來我敬禮大悲世尊平等攝聞名即息惡趣苦除三毒病藥師佛琉璃光佛我敬禮大悲智便釋氏生摧破無勝大魔軍如金須彌威德身釋迦牟尼我敬禮以下八偈係虎巢大師所造或不誦前八偈誦此八偈亦可東方去此四恒沙清淨佛土號無勝無量菩薩繞世尊善名稱揚我敬禮東方去此五恒沙清淨佛土號妙寶無量菩薩繞世尊寶月如來我敬禮東方去此六恒沙清淨佛土號香積無量菩薩繞世尊無垢金色我敬禮東方去此七恒沙清淨佛土號無憂無量菩薩繞世尊勝德無憂我敬禮東方去此八恒沙清淨佛土號法幢無量菩薩繞世尊法揚海音我敬禮東方去此九恒沙清淨佛土號寶海無量菩薩繞世尊勝慧如來我敬禮東方去此十恒沙清淨佛土毘琉璃無量菩薩繞世尊藥師如來我敬禮大悲精進超眾聖五濁他佛難調時堪忍百歲世界尊釋迦導師我敬禮能滅集諦無明種及除塵勞苦諦根佛母智慧到岸等三乘妙法我敬禮智藏童真法王子愍我等眾百𦽆迫宏開深廣妙法門文殊菩薩我敬禮方便慈仁越等倫國富民安增壽故演說壇儀供養法救脫菩薩我敬禮廣嚴城會如來前領任護衛此經典各發誓願承佛勅密主眾等我敬禮廣嚴因聞藥師名見諦發誓守此經各領七億眷屬等十二大將我敬禮應禮虛空一切剎深信一切功德剎有情變化剎塵身恒常遍禮剎塵佛所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛於一塵中塵數佛各處菩薩眾會中無盡法界塵亦然深信諸佛皆充滿各以一切音聲海普出無盡妙言詞盡於未來一切劫讚佛甚深功德海以諸最勝妙花鬘伎樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭一一皆如妙高聚我悉供養諸如來我以廣大勝解心深信一切三世佛悉以普賢行願力普遍供養諸如來我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔十方一切諸眾生二乘有學及無學一切如來與菩薩所有功德皆隨喜十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪諸佛若欲示涅槃我悉至誠而勸請唯願久住剎塵劫利樂一切諸眾生所有禮讚供養佛請佛住世轉法輪隨喜懺悔諸善根迴向眾生及佛道如是奉七支畢祝云如是欽遵七佛本願功德經中所說謹備供品陳設壇場恭請七佛如來應供正等正覺與釋迦牟尼引導世尊及其眷屬光臨壇所稱揚聖號禮拜供養發彼諸佛前所發願彼諸佛前懺悔罪愆隨喜善根勸請乞住以斯善根之力併佛菩薩威神攝授之力伏願掌教弘法利物濟人諸尊自在上師從無始以來所有積聚一切罪障悉皆消滅無病延年身居安穩興大事業世出世間一切祥瑞皆獲豐足究竟二種資糧圓滿即證堅固之身速獲無上佛乘一切世間內外所有災患悉皆消散安樂豐足獲得無上廣大菩提更願一切方隅人畜無殃亦無饑饉及與冤難永除不祥風調雨順穀稼豐登安樂吉祥豐滿具足一切眾生現居安樂來世往生彼佛國土面見彼佛親蒙授記圓滿二種資糧即證大覺果位更願妙法久住於世一切門路宣揚開闡復誦懺謝文出有壞如來應供正等正覺七佛及其眷屬與本師世尊釋迦如來并諸眷屬聖會面前今為某人云云兼為我等及利益眾生故虔心持誦此經時節我等惡時有情功行卑微有所未備或自不覺察因以懈弛故身語意行煩惱雜染或供品粗薄或不潔淨或所作儀軌不合經旨種種錯誤所有罪過伏冀大慈大悲哀愍垂宥永令不為障礙攝授垂錫不得及有失或因我愚惰自作令他作悉皆乞容恕惡時諸有情福劣無明盛未滿聖深意悉皆乞容恕無智因慳貪供品微薄過既具大悲尊悉皆乞容恕懈弛行不精乖違經儀軌不合如來旨悉皆乞容恕重複及遺缺壞敗儀軌式或復有忘失悉皆乞容恕復次奉送文世尊為利諸有情行願功德皆成就願佛暫歸各剎土再請大悲還降臨大慈大悲諸佛世尊善能利益我等一切已畢以神通力與其眷屬各還本土迴向偈文殊室利勇猛智普賢慈行亦復然我今迴向諸善根隨彼一切常修學三世諸佛我稱歎如是最勝諸大願我今迴向諸善根為得普賢殊勝行以此功德施眾生福德智慧所積聚福德智慧所發生獲得最妙二勝身一藥能治諸苦難一切安樂發生地願得供養及恭敬聖教永遠常住世諸佛菩薩攝授力因緣不爽真實力併以我信清淨力一切所願皆圓滿吉祥偈慈光照濁世間冥威德熾盛七如來本願昉揚悉達等諸佛吉祥願降集經耳能脫二際苦甚深微妙方等典心要本願八百頌諸法吉祥願降集此經啟源及延命護持令永流通住菩薩聲聞諸神將大眾吉祥願降集此吉祥讚三首各末句作樂其首者散華米也
